version: '3.8'

services:
  # MySQL数据库
  db:
    image: mysql:8.0
    container_name: top_topics_db
    environment:
      MYSQL_DATABASE: top_topics
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: top_topics_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - backend_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: top_topics_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend_network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: top_topics_es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - backend_network

  # Django后端
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: top_topics_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://admin:${MONGO_PASSWORD:-admin123}@mongo:27017/top_topics?authSource=admin
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - backend_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: top_topics_celery
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - backend_network

  # Celery Beat (定时任务)
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: top_topics_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - celery_worker
    networks:
      - backend_network

  # 前端
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: top_topics_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - backend_network

  # Nginx (生产环境)
  nginx:
    image: nginx:alpine
    container_name: top_topics_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend
    networks:
      - backend_network
    profiles:
      - production

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: top_topics_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - backend_network
    profiles:
      - monitoring

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: top_topics_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - backend_network
    profiles:
      - monitoring

volumes:
  db_data:
  mongo_data:
  redis_data:
  es_data:
  static_volume:
  media_volume:
  prometheus_data:
  grafana_data:

networks:
  backend_network:
    driver: bridge
